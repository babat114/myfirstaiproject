{% extends "base.html" %}
{% block title %}500 - 服务器错误{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 reveal reveal-scale">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card p-5">
            <div class="display-1 fw-bold text-danger mb-3">500</div>
            <i class="bi bi-tools fs-1 text-muted mb-3 d-block"></i>
            <h4 class="fw-bold mb-3">服务器内部错误</h4>
            <p class="text-muted mb-4">服务器遇到意外情况，无法完成请求。请稍后重试。</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-success">
                    返回首页
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-secondary">
                    刷新页面
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
