{% extends "base.html" %}
{% block title %}错误{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-muted">{{ error.code }}</h1>
    <p class="lead">{{ error.name }}</p>
    <p class="text-muted">{{ error.description }}</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">返回首页</a>
</div>
{% endblock %}
