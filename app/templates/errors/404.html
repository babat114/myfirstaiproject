{% extends "base.html" %}
{% block title %}404 - 页面不存在{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 reveal reveal-scale">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card p-5">
            <div class="display-1 fw-bold mb-3" style="color:var(--color-text-tertiary);">404</div>
            <i class="bi bi-emoji-frown fs-1 text-muted mb-3 d-block"></i>
            <h4 class="fw-bold mb-3">页面不存在</h4>
            <p class="text-muted mb-4">您访问的页面已被移除、链接错误或暂时不可用。</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-success">
                    返回首页
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    返回上页
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
