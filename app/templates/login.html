{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="bi bi-cpu-fill text-primary"></i> AI Platform</h2>
                    <p class="text-muted">登录您的账户</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="login_id" class="form-label">用户名或邮箱</label>
                        <input type="text" class="form-control" id="login_id" name="login_id"
                               placeholder="请输入用户名或邮箱" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="请输入密码" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('password')" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">保持登录状态</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted">
                        还没有账户？
                        <a href="{{ url_for('auth.register') }}">立即注册</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
