name: CI — Tests & Lint

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装测试额外依赖 (轻量级, 避免完整NLP/CV依赖)
        pip install pytest pytest-cov pytest-flake8

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -q --tb=short --cov=app --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov (optional)
      if: github.event_name == 'push'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flake8-docstrings

    - name: Run flake8
      run: |
        # 忽略常见误报: E501行太长, W503二元运算符前换行, D100缺少模块docstring
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit (security lint)
      run: bandit -r app/ -f custom -ll

    - name: Run Safety (dependency scan)
      run: safety check --file requirements.txt --policy-file .safety-policy.yml || true
