name: CI — Tests & Lint

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: ai_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql+pymysql://root:rootpass@127.0.0.1:3306/ai_platform_test
      FLASK_APP: run.py
      FLASK_ENV: testing
      SECRET_KEY: ci-secret-key-for-testing
      JWT_SECRET_KEY: ci-jwt-secret-key-for-testing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装测试额外依赖 (轻量级, 避免完整NLP/CV依赖)
        pip install pytest pytest-cov pymysql cryptography

    - name: Run database migrations
      run: flask db upgrade

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -q --tb=short --cov=app --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov (optional)
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flake8-docstrings ruff

    - name: Run flake8
      run: |
        # 忽略常见误报: E501行太长, W503二元运算符前换行, D100缺少模块docstring
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --max-complexity=15 --max-line-length=127 --statistics

    - name: Run ruff
      run: ruff check app/ --statistics

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit (security lint)
      run: bandit -r app/ -f custom -ll --skip B301,B310,B324,B615

    - name: Run Safety (dependency scan)
      run: safety check --file requirements.txt --policy-file .safety-policy.yml

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory — config exists but code may have untyped defs
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy types-PyYAML types-requests

    - name: Run mypy
      run: mypy app/ --ignore-missing-imports --show-error-codes

  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, security, type-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
