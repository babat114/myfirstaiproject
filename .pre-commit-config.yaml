# Pre-commit hooks for myfirstaiproject
# 安装: pip install pre-commit && pre-commit install
# 手动运行所有文件: pre-commit run --all-files

repos:
  # 通用检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^experiments/|^uploads/|\.md$
      - id: end-of-file-fixer
        exclude: ^experiments/|^uploads/|\.json$|\.csv$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python 代码格式化
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: [--line-length=120, --skip-string-normalization]
        exclude: ^migrations/|^venv/

  # Import 排序
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]
        exclude: ^migrations/|^venv/

  # Python 代码检查
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=127, --extend-ignore=E203,W503,D100,D104]
        exclude: ^migrations/|^venv/|^experiments/
        additional_dependencies: [flake8-docstrings]

  # 安全扫描
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [--recursive, --configfile=pyproject.toml]
        exclude: ^tests/|^venv/
